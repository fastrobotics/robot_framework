name: Generate and Host Doxygen

on:
  push:
    branches:
      - master # Change this to master if your default branch uses that name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Doxygen
        uses: DenverCoder1/doxygen-github-pages-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          config_file: Doxyfile
          folder: docs/html # Matches the HTML_OUTPUT in your Doxyfile
          branch: gh-pages
