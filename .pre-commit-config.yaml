repos:
  - repo: local
    hooks:
      - id: pre-commit-code-format
        name: Code Formatting
        entry: ./scripts/pre_commit/format_code.sh
        language: script
      
      - id: pre-commit-generate-doxygen
        name: Generate Doxygen
        entry: ./scripts/pre_commit/generate_doxygen.sh
        language: script